<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D.Gad | Anatomy Final Exam Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #2d6a4f;        /* أخضر زيتي غامق */
    --primary-light: #52b788;  /* أخضر زيتي فاتح */
    --primary-dark: #1b4332;   /* أخضر زيتي داكن */
    --secondary: #1e7a7a;      /* بترولي غامق */
    --secondary-light: #3d9e9e; /* بترولي فاتح */
    --tertiary: #a8d5ba;       /* أخضر ناعم */
    --dark: #1a2a2a;
    --darker: #0d1818;
    --card-bg: rgba(255,255,255,0.08);
    --card-bg-hover: rgba(255,255,255,0.14);
    --light: #e8f0ee;
    --gray: #9ab0aa;
    --gray-light: #c5d9d3;
    --white: #f5faf8;
    --success: #52b788;
    --success-light: #74c69d;
    --error: #d97777;
    --error-light: #e8a8a8;
    --warning: #b8a07c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(145deg, #e8f0ee 0%, #d4e4df 40%, #c5d9d3 100%);
    color: #1a2a2a;
    min-height: 100vh;
    overflow-x: hidden;
}

.hero-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 30% 40%, rgba(45,106,79,0.06) 0%, rgba(200,220,215,0.95) 70%);
    z-index: -1;
}

.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
}

.particle {
    position: absolute;
    background: rgba(45,106,79,0.08);
    border-radius: 50%;
    pointer-events: none;
    animation: floatParticle 25s infinite linear;
}

@keyframes floatParticle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(30,122,122,0.15);
    padding: 12px 24px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-small {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--secondary);
}

.brand {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
}

.progress-stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
}

.stat-badge {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(45,106,79,0.06);
    border: 1px solid rgba(45,106,79,0.12);
    color: var(--dark);
}

.stat-answered { background: rgba(30,122,122,0.06); border-color: rgba(30,122,122,0.15); }
.stat-correct { background: rgba(82,183,136,0.10); border-color: var(--success); color: var(--primary); }
.stat-wrong { background: rgba(217,119,119,0.08); border-color: var(--error); color: #8b5555; }
.stat-percent { background: rgba(45,106,79,0.08); border-color: var(--primary); color: var(--primary); }

.progress-bar-container {
    width: 160px;
    height: 5px;
    background: rgba(45,106,79,0.12);
    border-radius: 3px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border-radius: 3px;
    transition: width 0.3s;
}

.start-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 20px;
}

.start-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(45,106,79,0.12);
    border-radius: 32px;
    padding: 50px 40px;
    max-width: 600px;
    width: 100%;
    text-align: center;
    transition: all 0.3s;
    box-shadow: 0 8px 40px rgba(0,0,0,0.04);
}

.start-card:hover {
    transform: translateY(-5px);
    border-color: var(--secondary);
    background: rgba(255,255,255,0.92);
    box-shadow: 0 12px 50px rgba(0,0,0,0.06);
}

.main-logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--secondary);
    margin-bottom: 20px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(30,122,122,0.2); }
    50% { box-shadow: 0 0 0 15px rgba(30,122,122,0); }
}

.start-card h1 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 10px;
}

.start-card .sub {
    color: var(--gray);
    margin-bottom: 25px;
}

.filter-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 25px 0;
}

.filter-btns button {
    padding: 8px 20px;
    border-radius: 30px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(45,106,79,0.10);
    color: var(--gray);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: all 0.2s;
    font-weight: 500;
}

.filter-btns button:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(45,106,79,0.05);
}

.filter-btns button.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-color: var(--primary);
    color: white;
}

.q-count {
    margin: 20px 0;
    color: var(--gray);
}

.q-count span {
    color: var(--primary);
    font-weight: 700;
    font-size: 1.3rem;
}

.btn-start {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    padding: 14px 40px;
    border-radius: 40px;
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
}

.btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(45,106,79,0.25);
}

.quiz-wrapper {
    display: none;
    padding: 100px 20px 60px;
    max-width: 900px;
    margin: 0 auto;
}

.section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 30px 0 20px;
}

.section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--primary), transparent);
}

.section-line.right {
    background: linear-gradient(270deg, var(--primary), transparent);
}

.section-title {
    color: var(--primary);
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: rgba(45,106,79,0.06);
    padding: 5px 15px;
    border-radius: 20px;
}

.question-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(45,106,79,0.08);
    transition: all 0.3s;
    box-shadow: 0 2px 15px rgba(0,0,0,0.02);
}

.question-card:hover {
    transform: translateX(-5px);
    border-color: var(--secondary);
    background: rgba(255,255,255,0.92);
    box-shadow: 0 4px 25px rgba(0,0,0,0.04);
}

.question-card.correct {
    border-right: 4px solid var(--success);
    background: rgba(82,183,136,0.04);
}

.question-card.wrong {
    border-right: 4px solid var(--error);
    background: rgba(217,119,119,0.04);
}

.q-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
}

.q-num {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: white;
}

.q-cat {
    background: rgba(30,122,122,0.08);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--secondary);
}

.q-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #1a2a2a;
}

.options {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.option {
    padding: 12px 18px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(45,106,79,0.08);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    color: #1a2a2a;
}

.option::before {
    content: attr(data-letter);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(45,106,79,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: all 0.2s;
    color: var(--primary);
}

.option:hover:not(:disabled) {
    background: rgba(45,106,79,0.04);
    border-color: var(--primary);
    transform: translateX(-5px);
}

.option.correct {
    background: rgba(82,183,136,0.08);
    border-color: var(--success);
    color: var(--primary);
}

.option.correct::before {
    background: var(--success);
    color: white;
}

.option.wrong {
    background: rgba(217,119,119,0.08);
    border-color: var(--error);
    color: #8b5555;
}

.option.wrong::before {
    background: var(--error);
    color: white;
}

.option:disabled {
    cursor: default;
}

.feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.85rem;
    display: none;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.feedback.correct {
    background: rgba(82,183,136,0.06);
    border-right: 3px solid var(--success);
    color: var(--primary);
}

.feedback.wrong {
    background: rgba(217,119,119,0.06);
    border-right: 3px solid var(--error);
    color: #8b5555;
}

.submit-area {
    text-align: center;
    margin: 30px 0;
}

.btn-submit {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    padding: 14px 50px;
    border-radius: 40px;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(45,106,79,0.25);
}

.btn-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.results-screen {
    max-width: 800px;
    margin: 100px auto 50px;
    padding: 40px;
    background: rgba(255,255,255,0.90);
    backdrop-filter: blur(15px);
    border-radius: 32px;
    border: 1px solid rgba(45,106,79,0.10);
    text-align: center;
    display: none;
    animation: zoomIn 0.5s ease;
    box-shadow: 0 8px 40px rgba(0,0,0,0.04);
}

@keyframes zoomIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.results-logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--secondary);
    margin-bottom: 20px;
}

.results-screen h2 {
    color: var(--primary);
    font-size: 2rem;
    margin-bottom: 10px;
}

.score-circle {
    width: 150px;
    height: 150px;
    margin: 25px auto;
    position: relative;
}

.score-svg {
    transform: rotate(-90deg);
}

.score-bg {
    fill: none;
    stroke: rgba(45,106,79,0.08);
    stroke-width: 10;
}

.score-fill {
    fill: none;
    stroke: url(#scoreGrad);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
}

.score-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.score-big {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
}

.result-msg {
    color: var(--gray);
    margin: 15px 0;
}

.results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin: 25px 0;
}

.result-stat {
    padding: 15px;
    border-radius: 16px;
}

.result-stat.c { background: rgba(82,183,136,0.06); border: 1px solid var(--success); }
.result-stat.w { background: rgba(217,119,119,0.06); border: 1px solid var(--error); }
.result-stat.p { background: rgba(30,122,122,0.06); border: 1px solid var(--secondary); }

.result-stat .num {
    font-size: 1.8rem;
    font-weight: 800;
}

.result-stat.c .num { color: var(--primary); }
.result-stat.w .num { color: #8b5555; }
.result-stat.p .num { color: var(--secondary); }

.result-stat .label {
    font-size: 0.85rem;
    color: var(--gray);
}

.btn-restart {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    padding: 12px 30px;
    border-radius: 40px;
    color: white;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    margin: 10px 5px;
    transition: all 0.3s;
}

.btn-home {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(45,106,79,0.12);
    padding: 12px 30px;
    border-radius: 40px;
    color: var(--gray);
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    margin: 10px 5px;
    transition: all 0.3s;
}

.btn-restart:hover, .btn-home:hover {
    transform: translateY(-2px);
}

.btn-home:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.review-area {
    text-align: right;
    margin-top: 30px;
    max-height: 300px;
    overflow-y: auto;
}

.review-area h3 {
    color: var(--primary);
    margin-bottom: 15px;
}

.review-item {
    background: rgba(217,119,119,0.04);
    border-right: 3px solid var(--error);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 0.85rem;
}

@media (max-width: 768px) {
    .start-card { padding: 30px 20px; margin: 0 15px; }
    .start-card h1 { font-size: 1.5rem; }
    .question-card { padding: 18px; }
    .results-screen { padding: 25px; margin: 80px 15px 30px; }
    .results-stats { gap: 8px; }
    .result-stat .num { font-size: 1.3rem; }
    .stat-badge { font-size: 0.7rem; padding: 3px 8px; }
    .progress-bar-container { width: 100px; }
}
</style>
</head>
<body>

<div class="hero-bg"></div>
<div class="particles" id="particles"></div>

<nav class="navbar" id="navbar" style="display: none;">
    <div class="nav-container">
        <div class="logo-area">
            <img src="images/logo.png" class="logo-small" onerror="this.src='https://via.placeholder.com/40?text=ADGad'">
            <span class="brand">A.D.Gad</span>
        </div>
        <div class="progress-stats">
            <span class="stat-badge stat-answered" id="statAnswered">0/0</span>
            <span class="stat-badge stat-correct" id="statCorrect">✅ 0</span>
            <span class="stat-badge stat-wrong" id="statWrong">❌ 0</span>
            <span class="stat-badge stat-percent" id="statPercent">📊 0%</span>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
    </div>
</nav>

<div class="start-screen" id="startScreen">
    <div class="start-card">
        <img src="images/logo.png" class="main-logo" onerror="this.src='https://via.placeholder.com/100?text=ADGad'">
        <h1>A.D.Gad | Anatomy Exam</h1>
        <p class="sub">📚 MCQ Bank for Paramedical Students — Dr. Adel Elhawary</p>
        <div class="filter-btns" id="filterBtns">
            <button class="active" data-cat="all">📚 All</button>
            <button data-cat="general">🔬 General</button>
            <button data-cat="bones">🦴 Bones</button>
            <button data-cat="joints">🔗 Joints</button>
            <button data-cat="organs">🧠 Organs</button>
            <button data-cat="digestive">🫃 Digestive</button>
        </div>
        <div class="q-count">📋 Number of MCQ: <span id="totalQ">0</span></div>
        <button class="btn-start" id="startBtn">▶ Start Quiz</button>
    </div>
</div>

<div class="quiz-wrapper" id="quizWrapper">
    <div id="questionsContainer"></div>
    <div class="submit-area">
        <button class="btn-submit" id="submitBtn" disabled>🎯 Show Results</button>
    </div>
</div>

<div class="results-screen" id="resultsScreen">
    <img src="images/logo.png" class="results-logo" onerror="this.src='https://via.placeholder.com/80?text=ADGad'">
    <h2>🏆 Quiz Completed!</h2>
    <div class="score-circle">
        <svg width="150" height="150" viewBox="0 0 150 150">
            <defs><linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2d6a4f"/><stop offset="100%" stop-color="#1e7a7a"/></linearGradient></defs>
            <circle class="score-bg" cx="75" cy="75" r="60"/>
            <circle class="score-fill" id="scoreFill" cx="75" cy="75" r="60" stroke-dasharray="377" stroke-dashoffset="377"/>
        </svg>
        <div class="score-text">
            <div class="score-big" id="finalScore">0</div>
            <div style="font-size: 0.7rem;">out of <span id="finalTotal">0</span></div>
        </div>
    </div>
    <div id="resultMessage" class="result-msg"></div>
    <div class="results-stats">
        <div class="result-stat c"><div class="num" id="resultCorrect">0</div><div class="label">✅ Correct</div></div>
        <div class="result-stat w"><div class="num" id="resultWrong">0</div><div class="label">❌ Wrong</div></div>
        <div class="result-stat p"><div class="num" id="resultPercent">0%</div><div class="label">📊 Percentage</div></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">🔄 Retake Quiz</button>
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
    <div class="review-area" id="reviewArea"></div>
</div>

<script>
const L = ['A', 'B', 'C', 'D'];
const CATS = {
    general: '🔬 General Anatomy',
    bones: '🦴 Bones',
    joints: '🔗 Joints',
    organs: '🧠 Organs',
    digestive: '🫃 Digestive System'
};

// جميع الأسئلة من البنك - MCQ (1-98) بالإنجليزية
const ALL = [
    // 1-5: Anatomical Position & Planes
    {n:1,cat:'general',q:"In Anatomical Position:",opts:["The face upwards, Arms along the sides and Palms facing forwards.","The face forward, Arms along the sides and Palms facing backwards.","The face forward, Arms along the sides and Palms facing forwards.","The face forward, Arms together and Palms facing forwards."],c:2,exp:"الوضع التشريحي القياسي: الوجه للأمام، الذراعين بجانب الجسم، والكفين للأمام."},
    {n:2,cat:'general',q:"Midsagittal plane is:",opts:["Vertical plane dividing the body into equal right and left halves.","Vertical plane dividing the body into unequal right and left parts.","Vertical plane dividing the body into unequal anterior and posterior parts.","Vertical plane dividing the body into upper and lower halves."],c:0,exp:"المستوى النصفي هو مستوى عمودي يقسم الجسم إلى نصفين أيمن وأيسر متساويين."},
    {n:3,cat:'general',q:"Parasagittal planes:",opts:["Vertical plane dividing the body into equal right and left halves.","Vertical plane dividing the body into unequal right and left parts.","Vertical plane dividing the body into unequal anterior and posterior parts.","Vertical plane dividing the body into upper and lower halves."],c:1,exp:"المستويات المجاورة للنصفي تقسم الجسم إلى أجزاء يمنى ويسرى غير متساوية."},
    {n:4,cat:'general',q:"Coronal plane:",opts:["Vertical plane dividing the body into equal right and left halves.","Vertical plane dividing the body into unequal right and left parts.","Vertical plane dividing the body into unequal anterior and posterior parts.","Transverse plane dividing the body into unequal upper and lower parts."],c:2,exp:"المستوى الإكليلي يقسم الجسم إلى أجزاء أمامية وخلفية."},
    {n:5,cat:'general',q:"Transverse plane:",opts:["Vertical plane dividing the body into unequal right and left parts.","Vertical plane dividing the body into unequal anterior and posterior parts.","Horizontal plane dividing the body into unequal upper and lower parts.","Horizontal plane dividing the body into equal right and left halves."],c:2,exp:"المستوى العرضي يقسم الجسم إلى أجزاء علوية وسفلية غير متساوية."},

    {n:95,cat:'joints',q:"Following is cartilaginous joint:",opts:["Sagittal suture","Gomphosis","Pubic symphysis","Syndesmosis"],c:2,exp:"ارتفاق العانة هو مفصل غضروفي."},
    {n:96,cat:'joints',q:"Regarding the saddle joint, one of the following is true:",opts:["It is a fibrous joint.","Allows supination and pronation movements only","Acromio-clavicular joint is modified saddle","The carpometacarpal joint of the thumb is an example."],c:3,exp:"المفصل الرسغي السنعي للإبهام هو مفصل سرجي."},
    {n:97,cat:'joints',q:"The inferior tibio-fibular joint is an example of:",opts:["Fibrous joint.","Plane synovial joint.","Uniaxial synovial joint.","Biaxial synovial joint","Cartilaginous joint."],c:0,exp:"المفصل الظنبوبي الشظوي السفلي هو مفصل ليفي."},
    {n:98,cat:'joints',q:"A polyaxial synovial joint having a medial rotation movement its variety is:",opts:["Hinge.","Condyloid.","Ball and socket.","Plane joint"],c:2,exp:"مفصل الكرة والحق هو متعدد المحاور وله حركة دوران وسطي."}
];

let currentCategory = 'all';
let currentQuestions = [];
let answeredCount = 0;
let correctCount = 0;
let wrongCount = 0;
let quizActive = false;

// جسيمات عشوائية
for(let i = 0; i < 40; i++) {
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.width = Math.random() * 5 + 2 + 'px';
    p.style.height = p.style.width;
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = Math.random() * 20 + 15 + 's';
    p.style.animationDelay = Math.random() * 15 + 's';
    document.getElementById('particles').appendChild(p);
}

// أزرار التصفية
document.querySelectorAll('.filter-btns button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        const filtered = currentCategory === 'all' ? ALL : ALL.filter(q => q.cat === currentCategory);
        document.getElementById('totalQ').textContent = filtered.length;
    });
});

// تحميل العدد الأولي
document.getElementById('totalQ').textContent = ALL.length;

function startQuiz() {
    currentQuestions = currentCategory === 'all' ? [...ALL] : ALL.filter(q => q.cat === currentCategory);
    answeredCount = 0;
    correctCount = 0;
    wrongCount = 0;
    quizActive = true;
    
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('quizWrapper').style.display = 'block';
    document.getElementById('navbar').style.display = 'block';
    document.getElementById('resultsScreen').style.display = 'none';
    
    updateStats();
    renderQuestions();
}

function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    
    let lastCat = '';
    currentQuestions.forEach((q, idx) => {
        if (lastCat !== q.cat) {
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<div class="section-line"></div><div class="section-title">${CATS[q.cat]}</div><div class="section-line right"></div>`;
            container.appendChild(header);
            lastCat = q.cat;
        }
        
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${idx}`;
        card.dataset.index = idx;
        
        const optsHtml = q.opts.map((opt, optIdx) => 
            `<div class="option" data-letter="${L[optIdx]}" data-opt="${optIdx}" onclick="selectAnswer(${idx}, ${optIdx})">${opt}</div>`
        ).join('');
        
        card.innerHTML = `
            <div class="q-header">
                <div class="q-num">${q.n}</div>
                <div class="q-cat">${CATS[q.cat]}</div>
            </div>
            <div class="q-text">${q.q}</div>
            <div class="options" id="opts-${idx}">${optsHtml}</div>
            <div class="feedback" id="fb-${idx}"></div>
        `;
        container.appendChild(card);
    });
    
    document.getElementById('submitBtn').disabled = true;
}

function selectAnswer(qIdx, optIdx) {
    if (!quizActive) return;
    const q = currentQuestions[qIdx];
    const optsDiv = document.getElementById(`opts-${qIdx}`);
    if (optsDiv.querySelector('.correct,.wrong')) return;
    
    const isCorrect = optIdx === q.c;
    const allOpts = optsDiv.querySelectorAll('.option');
    
    allOpts.forEach(opt => {
        opt.style.pointerEvents = 'none';
        if (parseInt(opt.dataset.opt) === q.c) {
            opt.classList.add('correct');
        } else if (parseInt(opt.dataset.opt) === optIdx && !isCorrect) {
            opt.classList.add('wrong');
        }
    });
    
    const fb = document.getElementById(`fb-${qIdx}`);
    fb.style.display = 'block';
    fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
    fb.innerHTML = isCorrect ? `✅ Correct! ${q.exp}` : `❌ Wrong! The correct answer: ${q.opts[q.c]}<br>📖 ${q.exp}`;
    
    document.getElementById(`q-${qIdx}`).classList.add(isCorrect ? 'correct' : 'wrong');
    
    if (isCorrect) correctCount++;
    else wrongCount++;
    answeredCount++;
    
    updateStats();
    
    if (answeredCount === currentQuestions.length) {
        document.getElementById('submitBtn').disabled = false;
    }
}

function updateStats() {
    const total = currentQuestions.length;
    const percent = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;
    document.getElementById('statAnswered').textContent = `${answeredCount}/${total}`;
    document.getElementById('statCorrect').textContent = `✅ ${correctCount}`;
    document.getElementById('statWrong').textContent = `❌ ${wrongCount}`;
    document.getElementById('statPercent').textContent = `📊 ${percent}%`;
    const progress = total > 0 ? (answeredCount / total * 100) : 0;
    document.getElementById('progressFill').style.width = `${progress}%`;
}

function showResults() {
    quizActive = false;
    const total = currentQuestions.length;
    const percent = Math.round(correctCount / total * 100);
    
    document.getElementById('finalScore').textContent = correctCount;
    document.getElementById('finalTotal').textContent = total;
    document.getElementById('resultCorrect').textContent = correctCount;
    document.getElementById('resultWrong').textContent = wrongCount;
    document.getElementById('resultPercent').textContent = `${percent}%`;
    
    const circumference = 377;
    const offset = circumference - (percent / 100 * circumference);
    document.getElementById('scoreFill').style.strokeDashoffset = offset;
    
    let msg = '';
    if (percent >= 90) msg = '🌟 Excellent! Outstanding performance in Anatomy!';
    else if (percent >= 75) msg = '👏 Very Good! Keep up the great work!';
    else if (percent >= 60) msg = '👍 Good! Review the incorrect answers.';
    else msg = '📚 Needs more revision — You can do better!';
    document.getElementById('resultMessage').innerHTML = msg;
    
    const reviewDiv = document.getElementById('reviewArea');
    reviewDiv.innerHTML = '<h3>📋 Review Incorrect Answers</h3>';
    let hasWrong = false;
    
    currentQuestions.forEach((q, idx) => {
        const card = document.getElementById(`q-${idx}`);
        if (card && card.classList.contains('wrong')) {
            hasWrong = true;
            reviewDiv.innerHTML += `
                <div class="review-item">
                    <strong>❌ Question ${q.n}:</strong> ${q.q}<br>
                    <strong>✅ Correct Answer:</strong> ${q.opts[q.c]}<br>
                    <span style="font-size:0.8rem; opacity:0.8;">📖 ${q.exp}</span>
                </div>
            `;
        }
    });
    
    if (!hasWrong) {
        reviewDiv.innerHTML = '<div style="text-align:center;color:#2d6a4f;padding:20px;">🎉 All answers correct! Excellent work!</div>';
    }
    
    document.getElementById('quizWrapper').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'block';
}

function restartQuiz() {
    startQuiz();
}

function goHome() {
    quizActive = false;
    document.getElementById('quizWrapper').style.display = 'none';
    document.getElementById('navbar').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    window.scrollTo(0, 0);
}

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('submitBtn').addEventListener('click', showResults);
</script>
</body>
</html>
